<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracias por tu compra</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #020617, #0f172a);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* CONTENEDOR */
.container {
  text-align: center;
  padding: 30px;
}

/* CHECK */
.check {
  font-size: 70px;
  color: #22c55e;
  animation: pop 0.6s ease;
}

@keyframes pop {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}

/* TITULO */
h1 {
  margin-top: 20px;
  font-size: 24px;
}

/* TEXTO */
p {
  color: #94a3b8;
  margin-top: 10px;
}

/* BOTÓN */
.btn {
  margin-top: 25px;
  display: inline-block;
  padding: 12px 25px;
  background: #22c55e;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #16a34a;
}

/* SPINNER OPCIONAL */
.loader {
  margin-top: 20px;
  border: 4px solid #1f2937;
  border-top: 4px solid #22c55e;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>

</head>

<body>

<div class="container">
  <div class="check">✅</div>

  <h1>¡Pedido enviado!</h1>

  <p>Serás atendido por WhatsApp en unos momentos.</p>

  <div class="loader"></div>

  <a href="index.html" class="btn">Volver a la tienda</a>
</div>

</body>
</html>

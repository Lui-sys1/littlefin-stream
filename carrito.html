<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito - Littlefin Stream</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
  <div class="logo-container">
    <img src="logo.png" class="logo-principal" alt="Littlefin Stream logo">
    <h1>Tu Carrito</h1>
  </div>
  <a href="index.html" class="cart-icon">← Volver</a>
</header>

<main>

<div class="carrito-page">

  <h2>Resumen de tu compra</h2>

  <div id="lista-carrito"></div>

  <div class="resumen">
    <p>Subtotal <span id="subtotal">$0</span></p>
    <p>Descuento <span id="descuento">$0</span></p>
    <h3>Total <span id="total">$0</span></h3>
  </div>

  <!-- MÉTODO DE PAGO -->
  <div class="opciones">

  <button onclick="seleccionarPago('Transferencia')" id="btn-transferencia">
    💸 Transferencia
  </button>

  <button onclick="seleccionarPago('Link de pago')" id="btn-link">
    🔗 Link de pago
  </button>

  <button onclick="seleccionarPago('Efectivo')" id="btn-efectivo">
    💵 Efectivo
  </button>

</div>

  <button onclick="pagar()" class="btn-pagar">Finalizar compra</button>
  <button onclick="vaciarCarrito()" class="btn-vaciar">Vaciar carrito</button>

</div>

</main>

<script src="script.js"></script>

<script>
// Marcar método de pago guardado
const metodoGuardado = localStorage.getItem("metodoPago");

if (metodoGuardado) {
  if (metodoGuardado === "Transferencia") {
    document.getElementById("btn-transferencia")?.classList.add("activo");
  } else {
    document.getElementById("btn-link")?.classList.add("activo");
  }
}
</script>

</body>
</html>

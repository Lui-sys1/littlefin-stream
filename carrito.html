<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito - Littlefin</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
  <h1>Tu carrito</h1>
  <a href="index.html" class="cart-icon">← Volver</a>
</header>

<main>

<div class="carrito-page">

  <ul id="lista-carrito"></ul>

  <p id="total">Total: $0</p>

  <button onclick="pagar()">Finalizar compra</button>
  <button onclick="vaciarCarrito()" style="background:#ef4444; margin-top:10px;">
    Vaciar carrito
  </button>

</div>

</main>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

/* GUARDAR */
function guardarCarrito() {
  localStorage.setItem("carrito", JSON.stringify(carrito));
}

/* MOSTRAR */
function actualizarCarrito() {
  const lista = document.getElementById("lista-carrito");
  const totalTexto = document.getElementById("total");

  lista.innerHTML = "";
  let total = 0;

  carrito.forEach((item, index) => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${item.nombre} - $${item.precio}
      <button class="eliminar" onclick="eliminarProducto(${index})">X</button>
    `;
    lista.appendChild(li);
    total += item.precio;
  });

  let descuento = carrito.length >= 6 ? 0.10 :
                  carrito.length >= 3 ? 0.05 : 0;

  let totalFinal = total - (total * descuento);

  totalTexto.textContent = `Total: $${totalFinal.toFixed(2)}`;

  if (descuento > 0) {
    totalTexto.textContent += " (Descuento aplicado)";
  }
}

/* ELIMINAR */
function eliminarProducto(index) {
  carrito.splice(index, 1);
  guardarCarrito();
  actualizarCarrito();
}

/* VACIAR */
function vaciarCarrito() {
  carrito = [];
  guardarCarrito();
  actualizarCarrito();
}

/* PAGAR */
function pagar() {
  if (carrito.length === 0) {
    alert("Carrito vacío");
    return;
  }

  let mensaje = "Hola, quiero comprar:\n\n";

  carrito.forEach(item => {
    mensaje += `- ${item.nombre} $${item.precio}\n`;
  });

  let total = carrito.reduce((a,b)=>a+b.precio,0);

  let descuento = carrito.length>=6?0.10:carrito.length>=3?0.05:0;
  let totalFinal = total - (total*descuento);

  mensaje += `\nTotal: $${totalFinal.toFixed(2)}`;
  mensaje += "\n¿Está disponible?";

  let url = `https://wa.me/5212201467666?text=${encodeURIComponent(mensaje)}`;
  window.open(url, "_blank");
}

actualizarCarrito();
</script>

</body>
</html>

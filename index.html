<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Littlefin Stream</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">

  <div class="logo-container">
    <div class="logo-icon">LF</div>
    <h1>Littlefin Stream</h1>
  </div>

  <p class="subtitle">Streaming premium al mejor precio</p>

  <div class="top-info">
    Entrega inmediata · Garantía · Soporte rápido
  </div>

  <div class="cart-icon">
    🛒 <span id="contador">0</span>
  </div>

</header>

<p class="promo">
Descuento automático: 5% en 3 productos · 10% en 6 productos
</p>

<main>

<section class="section">
  <h2>Más vendidos</h2>
  <div class="grid">

    <div class="card">
      <img src="Netflix.png" class="logo">
      <h3>Netflix 1 Mes</h3>
      <p class="price">$110</p>
      <button onclick="agregarCarrito('Netflix 1 Mes',110)">Agregar</button>
    </div>

    <div class="card">
      <img src="disney.jpg" class="logo">
      <h3>Disney+ 1 Mes</h3>
      <p class="price">$70</p>
      <button onclick="agregarCarrito('Disney+ 1 Mes',70)">Agregar</button>
    </div>

  </div>
</section>

</main>

<!-- CARRITO -->
<div class="carrito">
  <h3>Tu carrito</h3>
  <ul id="lista-carrito"></ul>
  <p id="total">Total: $0</p>
  <button onclick="pagar()">Finalizar compra</button>
</div>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function guardarCarrito() {
  localStorage.setItem("carrito", JSON.stringify(carrito));
}

function agregarCarrito(nombre, precio) {
  carrito.push({ nombre, precio });
  guardarCarrito();
  actualizarCarrito();
}

function eliminarProducto(index) {
  carrito.splice(index, 1);
  guardarCarrito();
  actualizarCarrito();
}

function actualizarCarrito() {
  const lista = document.getElementById("lista-carrito");
  const totalTexto = document.getElementById("total");
  const contador = document.getElementById("contador");

  lista.innerHTML = "";

  let total = 0;

  carrito.forEach((item, index) => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${item.nombre} - $${item.precio}
      <button onclick="eliminarProducto(${index})">❌</button>
    `;
    lista.appendChild(li);
    total += item.precio;
  });

  contador.textContent = carrito.length;

  let descuento = 0;
  if (carrito.length >= 6) descuento = 0.10;
  else if (carrito.length >= 3) descuento = 0.05;

  let totalFinal = total - (total * descuento);

  totalTexto.textContent = `Total: $${totalFinal.toFixed(2)}`;
}

function pagar() {
  if (carrito.length === 0) return alert("Carrito vacío");

  let mensaje = "Hola, quiero comprar:\n\n";

  carrito.forEach(item => {
    mensaje += `- ${item.nombre} $${item.precio}\n`;
  });

  let total = carrito.reduce((a,b)=>a+b.precio,0);

  let descuento = carrito.length>=6?0.10:carrito.length>=3?0.05:0;
  let totalFinal = total - (total*descuento);

  mensaje += `\nTotal: $${totalFinal.toFixed(2)}`;

  let url = `https://wa.me/5212201467666?text=${encodeURIComponent(mensaje)}`;
  window.open(url, "_blank");
}

actualizarCarrito();
</script>

</body>
</html>
